[tools]
python = "3.12"
rust = "stable"

[env]
RUST_BACKTRACE = "1"

[tasks.setup]
description = "Fetch workspace dependencies"
run = "cargo fetch"

[tasks.build]
description = "Build the workspace core"
run = "cargo build --workspace"

[tasks.test]
description = "Run workspace tests"
run = "cargo test --workspace"

[tasks.e2e]
description = "Run the gRPC end-to-end test"
run = "cargo test -p anyserve-core --test grpc_e2e -- --nocapture"

[tasks.fmt]
description = "Format workspace sources"
run = "cargo fmt --all"

[tasks.clippy]
description = "Lint the workspace"
run = "cargo clippy --workspace --all-targets -- -D warnings"

[tasks.check]
description = "Run cargo check"
run = "cargo check --workspace"

[tasks.python-sdk]
description = "Build the Python bindings wheel"
run = "python -m pip install --quiet maturin && python -m maturin build --manifest-path clients/python/Cargo.toml --interpreter python"

[tasks.python-dist]
description = "Build the Python source and wheel distributions"
run = "rm -rf clients/python/dist && python -m pip install --quiet build maturin && python -m build clients/python"

[tasks.python-sdk-dev]
description = "Install the Python bindings into the active Python environment"
run = "python -m pip install --quiet maturin && python -m maturin develop --manifest-path clients/python/Cargo.toml"

[tasks.python-sdk-test]
description = "Run Python unit tests for the high-level bindings API"
run = """
python -m pip install --quiet maturin
python -m maturin build --manifest-path clients/python/Cargo.toml --interpreter python
WHEEL="$(python - <<'PY'
from pathlib import Path

candidates = []
for base in (Path("clients/python/dist"), Path("target/wheels")):
    candidates.extend(base.glob("anyserve_runtime-*.whl"))

if not candidates:
    raise SystemExit("no anyserve_runtime wheel found in clients/python/dist or target/wheels")

print(max(candidates, key=lambda path: path.stat().st_mtime))
PY
)"
python -m pip install --force-reinstall "$WHEEL"
python -m unittest discover -s clients/python/tests -p 'test_*.py'
"""

[tasks.python-sdk-e2e]
description = "Run Python SDK end-to-end tests against local Anyserve binaries"
run = """
mise exec -- cargo build -p anyserve -p anyserve-demo
python -m pip install --quiet maturin
python -m maturin build --manifest-path clients/python/Cargo.toml --interpreter python
WHEEL="$(python - <<'PY'
from pathlib import Path

candidates = []
for base in (Path("clients/python/dist"), Path("target/wheels")):
    candidates.extend(base.glob("anyserve_runtime-*.whl"))

if not candidates:
    raise SystemExit("no anyserve_runtime wheel found in clients/python/dist or target/wheels")

print(max(candidates, key=lambda path: path.stat().st_mtime))
PY
)"
python -m pip install --force-reinstall "$WHEEL"
python clients/python/tests/sdk_e2e.py
"""

[tasks.python-sdk-smoke]
description = "Install the built Python bindings wheel and verify the import surface"
run = """
python - <<'PY'
from pathlib import Path

candidates = []
for base in (Path("clients/python/dist"), Path("target/wheels")):
    candidates.extend(base.glob("anyserve_runtime-*.whl"))

if not candidates:
    raise SystemExit("no anyserve_runtime wheel found in clients/python/dist or target/wheels")

wheel = max(candidates, key=lambda path: path.stat().st_mtime)
print(wheel)
PY
WHEEL="$(python - <<'PY'
from pathlib import Path

candidates = []
for base in (Path("clients/python/dist"), Path("target/wheels")):
    candidates.extend(base.glob("anyserve_runtime-*.whl"))

if not candidates:
    raise SystemExit("no anyserve_runtime wheel found in clients/python/dist or target/wheels")

print(max(candidates, key=lambda path: path.stat().st_mtime))
PY
)"
python -m pip install --force-reinstall "$WHEEL"
python - <<'PY'
from anyserve import (
    AnyserveClient,
    HandlerSpec,
    SubmitterClient,
    WorkerClient,
    FRAME_DATA,
    get_handler_spec,
    inline_object,
    serve,
    uri_object,
    worker,
)

class _FakeNative:
    def list_jobs(self):
        return []

submitter = SubmitterClient(_FakeNative(), "http://127.0.0.1:50052")
worker_client = WorkerClient(_FakeNative(), "http://127.0.0.1:50052")

@worker(interface="demo.echo.v1", codec="bytes")
def echo(payload: bytes) -> bytes:
    return payload

spec = get_handler_spec(echo)

assert AnyserveClient.__name__ == "AnyserveClient"
assert isinstance(submitter, SubmitterClient)
assert isinstance(worker_client, WorkerClient)
assert isinstance(spec, HandlerSpec)
assert FRAME_DATA == "data"
assert inline_object(b"hello")["inline"] == b"hello"
assert uri_object("file:///tmp/example")["uri"] == "file:///tmp/example"
assert callable(submitter.list_jobs)
assert callable(worker_client.pull_frames)
assert callable(serve)
print(AnyserveClient)
PY
"""

[tasks.docs-build]
description = "Build the mdBook documentation"
run = """
if ! command -v mdbook >/dev/null 2>&1; then
  cargo install mdbook --locked
fi
mdbook build docs
"""
