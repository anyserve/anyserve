[tools]
python = "3.12"
rust = "stable"

[env]
RUST_BACKTRACE = "1"

[tasks.setup]
description = "Fetch workspace dependencies"
run = "cargo fetch"

[tasks.build]
description = "Build the Rust workspace"
run = "cargo build --workspace"

[tasks.test]
description = "Run workspace tests"
run = "cargo test --workspace"

[tasks.e2e]
description = "Run the gRPC end-to-end test"
run = "cargo test -p anyserve-core --test grpc_e2e -- --nocapture"

[tasks.fmt]
description = "Format workspace sources"
run = "cargo fmt --all"

[tasks.clippy]
description = "Lint the workspace"
run = "cargo clippy --workspace --all-targets -- -D warnings"

[tasks.check]
description = "Run cargo check"
run = "cargo check --workspace"

[tasks.python-sdk]
description = "Build the Rust-exported Python wheel"
run = "python -m pip install --quiet maturin && python -m maturin build --manifest-path clients/python/Cargo.toml --interpreter python"

[tasks.python-sdk-dev]
description = "Install the Rust-exported Python SDK into the active Python environment"
run = "python -m pip install --quiet maturin && python -m maturin develop --manifest-path clients/python/Cargo.toml"

[tasks.python-sdk-smoke]
description = "Install the built Python wheel and verify the import surface"
run = """
python -m pip install --force-reinstall "$(ls -t target/wheels/anyserve-*.whl | head -n 1)"
python - <<'PY'
from anyserve import AnyserveClient, FRAME_DATA, inline_object, uri_object

client = AnyserveClient("http://127.0.0.1:50052")
assert FRAME_DATA == "data"
assert inline_object(b"hello")["inline"] == b"hello"
assert uri_object("file:///tmp/example")["uri"] == "file:///tmp/example"
print(client)
PY
"""

[tasks.docs-build]
description = "Build the mdBook documentation"
run = """
if ! command -v mdbook >/dev/null 2>&1; then
  cargo install mdbook --locked
fi
mdbook build docs
"""
