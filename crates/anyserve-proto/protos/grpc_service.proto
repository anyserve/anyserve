syntax = "proto3";

package controlplane;

import "google/protobuf/empty.proto";

service ControlPlaneService {
  rpc SubmitJob(SubmitJobRequest) returns (SubmitJobResponse) {}
  rpc WatchJob(WatchJobRequest) returns (stream JobEvent) {}
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse) {}
  rpc GetJob(GetJobRequest) returns (JobRecord) {}
  rpc CancelJob(CancelJobRequest) returns (JobRecord) {}
  rpc GetAttempt(GetAttemptRequest) returns (AttemptRecord) {}
  rpc ListAttempts(ListAttemptsRequest) returns (ListAttemptsResponse) {}

  rpc RegisterWorker(RegisterWorkerRequest) returns (RegisterWorkerResponse) {}
  rpc HeartbeatWorker(HeartbeatWorkerRequest) returns (HeartbeatWorkerResponse) {}
  rpc PollLease(PollLeaseRequest) returns (PollLeaseResponse) {}
  rpc RenewLease(RenewLeaseRequest) returns (RenewLeaseResponse) {}
  rpc ReportEvent(ReportEventRequest) returns (google.protobuf.Empty) {}
  rpc CompleteLease(CompleteLeaseRequest) returns (google.protobuf.Empty) {}
  rpc FailLease(FailLeaseRequest) returns (google.protobuf.Empty) {}

  rpc OpenStream(OpenStreamRequest) returns (OpenStreamResponse) {}
  rpc GetStream(GetStreamRequest) returns (StreamRecord) {}
  rpc ListStreams(ListStreamsRequest) returns (ListStreamsResponse) {}
  rpc CloseStream(CloseStreamRequest) returns (StreamRecord) {}
  rpc PushFrames(stream PushFramesRequest) returns (PushFramesResponse) {}
  rpc PullFrames(PullFramesRequest) returns (stream Frame) {}
}

message ResourceQuantity {
  string name = 1;
  int64 value = 2;
}

message Demand {
  map<string, string> required_attributes = 1;
  map<string, string> preferred_attributes = 2;
  repeated ResourceQuantity required_capacity = 3;
}

message ExecutionPolicy {
  string profile = 1;
  int32 priority = 2;
  uint32 lease_ttl_secs = 3;
}

message ObjectRef {
  oneof reference {
    bytes inline = 1;
    string uri = 2;
  }
  map<string, string> metadata = 3;
}

message JobSpec {
  string interface_name = 1;
  repeated ObjectRef inputs = 2;
  bytes params = 3;
  Demand demand = 4;
  ExecutionPolicy policy = 5;
  map<string, string> metadata = 6;
}

enum JobState {
  JOB_STATE_UNSPECIFIED = 0;
  JOB_STATE_PENDING = 1;
  JOB_STATE_LEASED = 2;
  JOB_STATE_RUNNING = 3;
  JOB_STATE_SUCCEEDED = 4;
  JOB_STATE_FAILED = 5;
  JOB_STATE_CANCELLED = 6;
}

message JobRecord {
  string job_id = 1;
  JobState state = 2;
  JobSpec spec = 3;
  repeated ObjectRef outputs = 4;
  string lease_id = 5;
  uint64 version = 6;
  uint64 created_at_ms = 7;
  uint64 updated_at_ms = 8;
  string last_error = 9;
  string current_attempt_id = 10;
}

enum AttemptState {
  ATTEMPT_STATE_UNSPECIFIED = 0;
  ATTEMPT_STATE_CREATED = 1;
  ATTEMPT_STATE_LEASED = 2;
  ATTEMPT_STATE_RUNNING = 3;
  ATTEMPT_STATE_SUCCEEDED = 4;
  ATTEMPT_STATE_FAILED = 5;
  ATTEMPT_STATE_EXPIRED = 6;
  ATTEMPT_STATE_CANCELLED = 7;
}

message AttemptRecord {
  string attempt_id = 1;
  string job_id = 2;
  string worker_id = 3;
  string lease_id = 4;
  AttemptState state = 5;
  uint64 created_at_ms = 6;
  uint64 started_at_ms = 7;
  uint64 finished_at_ms = 8;
  string last_error = 9;
  map<string, string> metadata = 10;
}

enum EventKind {
  EVENT_KIND_UNSPECIFIED = 0;
  EVENT_KIND_ACCEPTED = 1;
  EVENT_KIND_LEASE_GRANTED = 2;
  EVENT_KIND_STARTED = 3;
  EVENT_KIND_PROGRESS = 4;
  EVENT_KIND_OUTPUT_READY = 5;
  EVENT_KIND_SUCCEEDED = 6;
  EVENT_KIND_FAILED = 7;
  EVENT_KIND_CANCELLED = 8;
  EVENT_KIND_LEASE_EXPIRED = 9;
  EVENT_KIND_REQUEUED = 10;
}

message JobEvent {
  string job_id = 1;
  uint64 sequence = 2;
  EventKind kind = 3;
  bytes payload = 4;
  map<string, string> metadata = 5;
  uint64 created_at_ms = 6;
}

message WorkerSpec {
  repeated string interfaces = 1;
  map<string, string> attributes = 2;
  repeated ResourceQuantity total_capacity = 3;
  uint32 max_active_leases = 4;
  map<string, string> metadata = 5;
}

message WorkerStatus {
  repeated ResourceQuantity available_capacity = 1;
  uint32 active_leases = 2;
  map<string, string> metadata = 3;
  uint64 last_seen_at_ms = 4;
}

message WorkerRecord {
  string worker_id = 1;
  WorkerSpec spec = 2;
  WorkerStatus status = 3;
  uint64 registered_at_ms = 4;
  uint64 expires_at_ms = 5;
}

message LeaseRecord {
  string lease_id = 1;
  string job_id = 2;
  string worker_id = 3;
  uint64 issued_at_ms = 4;
  uint64 expires_at_ms = 5;
}

enum StreamScope {
  STREAM_SCOPE_UNSPECIFIED = 0;
  STREAM_SCOPE_JOB = 1;
  STREAM_SCOPE_ATTEMPT = 2;
  STREAM_SCOPE_LEASE = 3;
}

enum StreamDirection {
  STREAM_DIRECTION_UNSPECIFIED = 0;
  STREAM_DIRECTION_CLIENT_TO_WORKER = 1;
  STREAM_DIRECTION_WORKER_TO_CLIENT = 2;
  STREAM_DIRECTION_BIDIRECTIONAL = 3;
  STREAM_DIRECTION_INTERNAL = 4;
}

enum StreamState {
  STREAM_STATE_UNSPECIFIED = 0;
  STREAM_STATE_OPEN = 1;
  STREAM_STATE_CLOSING = 2;
  STREAM_STATE_CLOSED = 3;
  STREAM_STATE_ERROR = 4;
}

enum FrameKind {
  FRAME_KIND_UNSPECIFIED = 0;
  FRAME_KIND_OPEN = 1;
  FRAME_KIND_DATA = 2;
  FRAME_KIND_CLOSE = 3;
  FRAME_KIND_ERROR = 4;
  FRAME_KIND_CHECKPOINT = 5;
  FRAME_KIND_CONTROL = 6;
}

message StreamRecord {
  string stream_id = 1;
  string job_id = 2;
  string attempt_id = 3;
  string lease_id = 4;
  string stream_name = 5;
  StreamScope scope = 6;
  StreamDirection direction = 7;
  StreamState state = 8;
  map<string, string> metadata = 9;
  uint64 created_at_ms = 10;
  uint64 closed_at_ms = 11;
  uint64 last_sequence = 12;
}

message Frame {
  string stream_id = 1;
  uint64 sequence = 2;
  FrameKind kind = 3;
  bytes payload = 4;
  map<string, string> metadata = 5;
  uint64 created_at_ms = 6;
}

message SubmitJobRequest {
  string job_id = 1;
  JobSpec spec = 2;
}

message SubmitJobResponse {
  JobRecord job = 1;
}

message WatchJobRequest {
  string job_id = 1;
  uint64 after_sequence = 2;
}

message ListJobsRequest {}

message ListJobsResponse {
  repeated JobRecord jobs = 1;
}

message GetJobRequest {
  string job_id = 1;
}

message CancelJobRequest {
  string job_id = 1;
}

message GetAttemptRequest {
  string attempt_id = 1;
}

message ListAttemptsRequest {
  string job_id = 1;
}

message ListAttemptsResponse {
  repeated AttemptRecord attempts = 1;
}

message RegisterWorkerRequest {
  string worker_id = 1;
  WorkerSpec spec = 2;
}

message RegisterWorkerResponse {
  WorkerRecord worker = 1;
  uint64 heartbeat_ttl_secs = 2;
}

message HeartbeatWorkerRequest {
  string worker_id = 1;
  repeated ResourceQuantity available_capacity = 2;
  uint32 active_leases = 3;
  map<string, string> metadata = 4;
}

message HeartbeatWorkerResponse {
  WorkerRecord worker = 1;
  uint64 heartbeat_ttl_secs = 2;
}

message PollLeaseRequest {
  string worker_id = 1;
}

message PollLeaseResponse {
  LeaseRecord lease = 1;
  JobRecord job = 2;
  AttemptRecord attempt = 3;
}

message RenewLeaseRequest {
  string worker_id = 1;
  string lease_id = 2;
}

message RenewLeaseResponse {
  LeaseRecord lease = 1;
}

message ReportEventRequest {
  string worker_id = 1;
  string lease_id = 2;
  EventKind kind = 3;
  bytes payload = 4;
  map<string, string> metadata = 5;
}

message CompleteLeaseRequest {
  string worker_id = 1;
  string lease_id = 2;
  repeated ObjectRef outputs = 3;
  map<string, string> metadata = 4;
}

message FailLeaseRequest {
  string worker_id = 1;
  string lease_id = 2;
  string reason = 3;
  bool retryable = 4;
  map<string, string> metadata = 5;
}

message OpenStreamRequest {
  string job_id = 1;
  string attempt_id = 2;
  string worker_id = 3;
  string lease_id = 4;
  string stream_name = 5;
  StreamScope scope = 6;
  StreamDirection direction = 7;
  map<string, string> metadata = 8;
}

message OpenStreamResponse {
  StreamRecord stream = 1;
}

message GetStreamRequest {
  string stream_id = 1;
}

message ListStreamsRequest {
  string job_id = 1;
}

message ListStreamsResponse {
  repeated StreamRecord streams = 1;
}

message CloseStreamRequest {
  string stream_id = 1;
  string worker_id = 2;
  string lease_id = 3;
  map<string, string> metadata = 4;
}

message PushFramesRequest {
  string stream_id = 1;
  string worker_id = 2;
  string lease_id = 3;
  FrameKind kind = 4;
  bytes payload = 5;
  map<string, string> metadata = 6;
}

message PushFramesResponse {
  StreamRecord stream = 1;
  uint64 last_sequence = 2;
  uint64 written_frames = 3;
}

message PullFramesRequest {
  string stream_id = 1;
  uint64 after_sequence = 2;
  bool follow = 3;
}
