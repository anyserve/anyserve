name: Publish Python Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: clients/python/pyproject.toml

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install mise
        run: curl https://mise.run | sh

      - name: Add tool paths
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          . "$HOME/.cargo/env"
          mise trust --all
          mise install

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build source distribution
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          . "$HOME/.cargo/env"
          python -m pip install --upgrade build maturin
          python -m build clients/python --sdist --outdir dist

      - name: Validate source distribution metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/*

  build-macos-wheel:
    name: Build macOS arm64 wheel
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: clients/python/pyproject.toml

      - name: Install protoc
        run: brew install protobuf

      - name: Install mise
        run: curl https://mise.run | sh

      - name: Add tool paths
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          . "$HOME/.cargo/env"
          mise trust --all
          mise install

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build macOS wheel
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          . "$HOME/.cargo/env"
          python -m pip install --upgrade maturin
          python -m maturin build --release --manifest-path clients/python/Cargo.toml --interpreter python --out dist

      - name: Validate wheel metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-macos-arm64
          path: dist/*

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - build-sdist
      - build-macos-wheel
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
