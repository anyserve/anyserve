name: anyserve CI

on:
  push:
    branches: ["main"]
    paths:
      - "crates/**"
      - "clients/rust/**"
      - "docs/**"
      - "api/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "mise.toml"
      - ".github/workflows/anyserve-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "crates/**"
      - "clients/rust/**"
      - "docs/**"
      - "api/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "mise.toml"
      - ".github/workflows/anyserve-ci.yml"


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install mise
        run: curl https://mise.run | sh

      - name: Add tool paths
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          . "$HOME/.cargo/env"
          mise trust --all
          mise install

      - name: Install maturin
        run: python -m pip install maturin

      - name: Format
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          . "$HOME/.cargo/env"
          cargo fmt --all --check

      - name: Check
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          . "$HOME/.cargo/env"
          mise run check

      - name: Test
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          . "$HOME/.cargo/env"
          mise run test

      - name: Build Python wheel
        run: python -m maturin build --manifest-path clients/python/Cargo.toml --interpreter python
