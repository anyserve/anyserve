name: Build and test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install Buf
        uses: bufbuild/buf-setup-action@v1.50.0

      - name: Generate gRPC files
        run: make buf

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: Build
        run: cd anyserve && make build-all

      - name: Test
        run: cd anyserve && make test COVERAGE=1

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./anyserve/coverage.txt
          token: ${{ secrets.CODECOV_TOKEN }}
